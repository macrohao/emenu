[build]
  base = "client"
  command = "npm install && npm run build"
  publish = "build"

[[redirects]]
  from = "/api/*"
  to = "https://emenu-alpha.vercel.app/api/:splat"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "https://emenu-alpha.vercel.app/uploads/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
